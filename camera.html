<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Camera App</title>

    <style>
        body {
            display: flex;
            padding: 20px;
            margin: 0;
            background: #f8f0f4;
        }

        .startCamera {
            width: 400px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(229, 138, 196, 0.8);
        }

        .history {
            width: 700px;
            padding: 20px;
            margin-left: 20px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(229, 138, 196, 0.8);
        }

        button {
            border: none;
            background: #ff8fab;
            color: white;
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            cursor: pointer;
        }

        video {
            width: 100%;
            border-radius: 10px;
        }

        canvas {
            width: 100%;
            margin-top: 15px;
            border-radius: 10px;
        }

        #gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        #gallery img {
            width: calc(33.33% - 10px);
            border-radius: 10px;
            object-fit: cover;
        }

        .download {
            display: block;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

    <div class="startCamera">

        <button onclick="startCamera()">Start</button>

        <button onclick="stopCamera()">Stop</button>

        <button onclick="takePhoto()">Capture</button>

        <br>

        <button onclick="changeFilter('none')">
            Normal
        </button>

        <button onclick="changeFilter('grayscale(100%)')">
            Gray
        </button>

        <button onclick="changeFilter('sepia(100%)')">
            Sepia
        </button>

        <button onclick="changeFilter('blur(3px)')">
            Blur
        </button>
        <button onclick="changeFilter('brightness(105%) contrast(95%) saturate(130%)')">
            Dreamy1
        </button>

        <button onclick="changeFilter('sepia(15%) brightness(105%) contrast(95%) saturate(140%)')">
            Dreamy2
        </button>

        <button onclick="changeFilter('sepia(25%) brightness(105%) saturate(160%) hue-rotate(-10deg)')">
            Pink Dream
        </button>
        <video id="video" autoplay></video>

        <canvas id="canvas"></canvas>

    </div>

    <div class="history">

        <h3>Photo History</h3>

        <div id="gallery"></div>

    </div>

    <script>

        let currentFilter = "none";

        function changeFilter(filter) {

            currentFilter = filter;

            document.getElementById("video")
                .style.filter = filter;

        }

        function startCamera() {

            navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: "user"
                }
            })
                .then(stream => {

                    document.getElementById("video").srcObject = stream;

                })
                .catch(error => {

                    alert("Error: " + error.message);

                });

        }

        function stopCamera() {

            let video = document.getElementById("video");

            let stream = video.srcObject;

            if (stream) {

                stream.getTracks()
                    .forEach(track => track.stop());

                video.srcObject = null;

            }

        }

        function takePhoto() {

            let video = document.getElementById("video");

            let canvas = document.getElementById("canvas");

            canvas.width = video.videoWidth;

            canvas.height = video.videoHeight;

            let ctx = canvas.getContext("2d");

            ctx.filter = currentFilter;

            ctx.drawImage(
                video,
                0,
                0,
                canvas.width,
                canvas.height
            );

            let image = canvas.toDataURL("image/png");

            let img = document.createElement("img");

            img.src = image;

            img.onclick = function () {

                let newTab = window.open();

                newTab.document.write(
                    "<img src='" + image + "' width='50%'>"
                );

            };

            img.ondblclick = function () {

                img.remove();

            };

            let download = document.createElement("a");

            download.href = image;

            download.download = "photo.png";

            download.innerText = "Download";

            download.classList.add("download");

            document
                .getElementById("gallery")
                .prepend(download);

            document
                .getElementById("gallery")
                .prepend(img);

        }

    </script>

</body>

</html>
